# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Mobile roles --
    - "Flutter"
    - "React Native"
    - "Mobile Engineer"
    - "Mobile Developer"
    - "App Developer"
    - "Cross-Platform"
    - "Dart"
    # -- Android roles --
    - "Android"
    - "Kotlin"
    # -- Full Stack roles --
    - "Full Stack"
    - "Fullstack"
    - "Full-Stack"
    # -- Frontend roles --
    - "Frontend"
    - "Front-End"
    - "React"
    - "Next.js"
    # -- Backend roles --
    - "Backend"
    - "Back-End"
    - "Node.js"
    - "NestJS"
    - "TypeScript"
    # -- General engineering --
    - "Software Engineer"
    - "Software Developer"
    - "SDE"
    - "Product Engineer"
    - "Founding Engineer"
    # -- IoT / BLE --
    - "IoT"
    - "BLE"
    - "Bluetooth"
  negative:
    # [CUSTOMIZE] Roles to exclude
    - "Junior"
    - "Intern"
    - ".NET"
    - "Java "
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "C++"
    - "Rust"
    - "Go "
    - "DevOps"
    - "SRE"
    - "Data Scientist"
    - "ML Engineer"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Ashby --
  - name: Ashby — Flutter & React Native
    query: 'site:jobs.ashbyhq.com "Flutter" OR "React Native" OR "Mobile Engineer" remote'
    enabled: true

  - name: Ashby — Full Stack TypeScript
    query: 'site:jobs.ashbyhq.com "Full Stack" OR "Fullstack" TypeScript OR "Node.js" OR "NestJS" remote senior'
    enabled: true

  - name: Ashby — Android Kotlin
    query: 'site:jobs.ashbyhq.com "Android Engineer" OR "Kotlin" senior remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Mobile Engineer
    query: 'site:job-boards.greenhouse.io "Flutter" OR "React Native" OR "Mobile Engineer" OR "Mobile Developer" remote'
    enabled: true

  - name: Greenhouse — Full Stack Senior
    query: 'site:job-boards.greenhouse.io "Full Stack" OR "Fullstack" "Senior" TypeScript OR "Node.js" remote'
    enabled: true

  - name: Greenhouse — Android Kotlin
    query: 'site:job-boards.greenhouse.io "Android Engineer" OR "Android Developer" OR "Kotlin" senior remote'
    enabled: true

  # -- Lever --
  - name: Lever — Mobile & Full Stack
    query: 'site:jobs.lever.co "Flutter" OR "React Native" OR "Mobile Engineer" OR "Full Stack" TypeScript remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — Mobile Engineer
    query: 'site:wellfound.com "Flutter" OR "React Native" OR "Mobile Engineer" remote senior'
    enabled: true

  - name: Wellfound — Full Stack
    query: 'site:wellfound.com "Full Stack" OR "Fullstack" TypeScript OR "Node.js" remote senior'
    enabled: true

  # -- YC startups --
  - name: YC Jobs — Mobile & Full Stack
    query: 'site:workatastartup.com "Flutter" OR "React Native" OR "Mobile Engineer" OR "Full Stack" TypeScript remote'
    enabled: true

  # -- India job boards --
  - name: Naukri — Flutter & Mobile (Bengaluru)
    query: 'site:naukri.com "Flutter" OR "React Native" "Senior" Bengaluru OR remote'
    enabled: true

  - name: Instahyre — Senior Mobile & Full Stack
    query: 'site:instahyre.com "Flutter" OR "React Native" OR "Mobile Engineer" OR "Full Stack" senior'
    enabled: true

  - name: Cutshort — Mobile & TypeScript
    query: 'site:cutshort.io "Flutter" OR "React Native" OR "Full Stack" TypeScript senior'
    enabled: true

  # -- Global remote job boards --
  - name: RemoteOK — Mobile & Full Stack
    query: 'site:remoteok.com "Flutter" OR "React Native" OR "Mobile" OR "Full Stack" engineer'
    enabled: true

  - name: WeWorkRemotely — Mobile & Full Stack
    query: 'site:weworkremotely.com "Mobile" OR "Flutter" OR "React Native" OR "Full Stack" engineer'
    enabled: true

  - name: Himalayas — Remote Mobile
    query: 'site:himalayas.app "Flutter" OR "React Native" OR "Mobile Engineer" OR "Full Stack" remote'
    enabled: true

  - name: Remotive — Mobile & Full Stack
    query: 'site:remotive.com "Flutter" OR "React Native" OR "Mobile Engineer" OR "Full Stack" TypeScript'
    enabled: true

  - name: HN Who's Hiring — Mobile & Full Stack
    query: 'site:news.ycombinator.com "Flutter" OR "React Native" OR "Mobile Engineer" OR "Full Stack" TypeScript remote'
    enabled: true

